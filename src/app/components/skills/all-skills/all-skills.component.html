<app-back></app-back>
<main class="all-skills">
  <header class="title page" [appReveal]="'up'">
    <span class="eyebrow">
      <span class="crumb"><i class="bi bi-house" aria-hidden="true"></i><span>Home</span></span>
      <span class="sep">·</span>
      <span class="crumb"><i class="bi bi-layers-half" aria-hidden="true"></i><span>Skills</span></span>
    </span>
    <h1>What I build with.</h1>
    <p class="prose">Technologies and tools across frontend, backend, and infrastructure work.</p>
  </header>

  <div class="page skills-container">
    @for (item of skillsList; track $index) {
      @for (i of item.name; track $index) {
        <div class="skill-card">
          <div class="name">
            <i [ngClass]="item.icon[$index]" [ngStyle]="{ color: item.color[$index] }"></i>
            <h2>{{item.name[$index]}}</h2>
          </div>
          <div class="content">
            <div class="text">
              <p>{{item.learned[$index]}}</p>
              <p>{{item.geined[$index]}}</p>
            </div>
            <div class="star-rating">
              <i style="color: gold;" *ngFor="let j of range(item.rating[$index])" class="bi bi-star-fill"></i>
              <i style="color: gold;" *ngFor="let j of range(5 - item.rating[$index])" class="bi bi-star"></i>
            </div>
          </div>
        </div>
      }
    }
  </div>
</main>
