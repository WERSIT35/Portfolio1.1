<app-back></app-back>
<main class="projects-page">
  <header class="title page">
    <h1>Portfolio | Projects</h1>
  </header>
  <section class="projsec page">
    <article *ngFor="let item of projectsList; let index = index" class="project-card">
      <section *ngIf="hasMedia(item); else mediaFallback" [id]="'projects' + index" class="splide project-media project-slider" [class.mobile-media]="isProjectMobile(index)">
        <button type="button" class="view-toggle media-toggle" *ngIf="hasSplitMedia(item)" (click)="toggleProjectView(index)">
          <i class="bi" [ngClass]="isProjectMobile(index) ? 'bi-display' : 'bi-phone'"></i>
          <span>{{ isProjectMobile(index) ? 'Switch To Web' : 'Switch To Mobile' }}</span>
        </button>
        <div class="splide__track">
          <ul class="splide__list">
            <li *ngFor="let img of getVisibleImages(item, index)" class="splide__slide">
              <img [src]="img" alt="" (click)="openPreview(img)">
            </li>
          </ul>
        </div>
      </section>
      <ng-template #mediaFallback>
        <section class="project-media project-media-empty">
          <p>Project media will be added soon</p>
        </section>
      </ng-template>

      <div class="projInfo">
        <div class="subinfo">
          <div class="topline">
            <h2>{{item.projName}}</h2>
          </div>
          <div class="meta">
            <p>{{item.subname}}</p>
            <p>{{item.duration}}</p>
            <p>{{item.date}}</p>
            <p>{{item.numOfPage}} pages</p>
          </div>
          <p class="about">{{item.about}}</p>
          <ul class="highlights" *ngIf="item.highlights?.length">
            <li *ngFor="let point of item.highlights | slice:0:3">{{ point }}</li>
          </ul>
          <a class="details-toggle" [routerLink]="['/projects', index]">Open Detailed Info</a>
          <div class="project-actions">
            <a class="visit" [href]="item.link" target="_blank" rel="noopener noreferrer">
              <span>Open Live Site</span>
              <i class="bi bi-arrow-up-right"></i>
            </a>
            <a class="visit github-link" [href]="item.github" target="_blank" rel="noopener noreferrer">
              <i class="bi bi-github"></i>
              <span>GitHub</span>
            </a>
          </div>
        </div>
      </div>
    </article>
  </section>
</main>

<div class="image-preview" *ngIf="previewImage" (click)="closePreview()">
  <button type="button" class="preview-close" (click)="closePreview(); $event.stopPropagation()" aria-label="Close image">
    <i class="bi bi-x-lg"></i>
  </button>
  <img [src]="previewImage" alt="" (click)="$event.stopPropagation()">
</div>
