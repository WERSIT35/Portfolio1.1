<app-back></app-back>
<main class="projects-page">
  <header class="title page">
    <h1>Portfolio | Projects</h1>
  </header>
  <section class="projsec page">
    <article *ngFor="let item of projectsList; let index = index" class="project-card">
      <section [id]="'projects' + index" class="splide project-media">
        <div class="splide__track">
          <ul class="splide__list">
            <li *ngFor="let img of item.img" class="splide__slide">
              <img [src]="img" alt="">
            </li>
          </ul>
        </div>
      </section>
      <div class="projInfo">
        <div class="subinfo">
          <div class="topline">
            <h2>{{item.projName}}</h2>
            <i class="bi bi-three-dots"></i>
          </div>
          <div class="meta">
            <p>{{item.subname}}</p>
            <p>{{item.duration}}</p>
            <p>{{item.date}}</p>
          </div>
          <a class="visit" [href]="item.link" target="_blank">Visit Website</a>
        </div>
      </div>
    </article>
  </section>
</main>
