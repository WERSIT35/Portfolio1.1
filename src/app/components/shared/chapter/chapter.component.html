<section class="chapter" [attr.id]="id">
  <div class="page">
    <header class="chapter-header" [appReveal]="'up'">
      @if (number) {
        <span class="chapter-num">{{ number }}</span>
      }
      <h2 class="chapter-title">{{ title }}</h2>
      <span class="chapter-spacer"></span>
      <span class="chapter-action-slot">
        <ng-content select="[chapter-action]"></ng-content>
      </span>
      @if (actionLabel && actionLink) {
        <a [routerLink]="actionLink" class="chapter-action">{{ actionLabel }} →</a>
      }
    </header>
    <div class="chapter-body" [appReveal]="'up'" [revealDelay]="80">
      <ng-content></ng-content>
    </div>
  </div>
</section>
