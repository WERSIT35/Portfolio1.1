<app-back></app-back>
<main class="all-experience">
  <header class="title page">
    <h1>EXperience</h1>
  </header>
  <section class="exp page">
    @for (item of experienceList; track $index) {
      <article class="exCard">
        <a [routerLink]="['/exp',item.id]" class="exLink">
          <div class="exTop">
            <div class="exTitleRow">
              <h2>{{ item.name }}</h2>
              <p class="date">{{item.date}}</p>
            </div>
          </div>
          <div class="exInfo">
            <p class="eyebrow">{{item.subname}}</p>
            <div class="subnameTxt">
              @for (tool of item.subnameText; track $index) {
                <p>{{tool}}</p>
              }
            </div>
            <p class="eyebrow">{{item.subname1}}</p>
            <div class="subnameTxt1">
              @for (resp of item.subname1Text; track $index) {
                <p>{{resp}}</p>
              }
            </div>
          </div>
          <div class="exFooter">
            <span>View full details</span>
            <i class="fa-solid fa-arrow-right"></i>
          </div>
        </a>
      </article>
    }
  </section>
</main>
