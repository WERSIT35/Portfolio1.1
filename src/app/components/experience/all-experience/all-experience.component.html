<app-back></app-back>
<main class="all-experience">
  <header class="title page">
    <h1>EXperience</h1>
  </header>
  <section class="exp page">
    @for (item of experienceList; track $index) {
      <article class="exCard">
        <a [routerLink]="['/exp',item.id]">
          <div class="exTitle">
            <div class="subTitle">
              <h2>{{ item.name }} </h2>
              <i class="fa-solid fa-ellipsis"></i>
            </div>
          </div>
          <div class="exInfo">
            <div class="subname">
              <h2>{{item.subname}}:</h2>
              <div class="subnameTxt">
                @for (tool of item.subnameText; track $index) {
                  <p>{{tool}}</p>
                }
              </div>
            </div>
            <div class="subname1">
              <h2>{{item.subname1}}:</h2>
              <div class="subnameTxt1">
                @for (resp of item.subname1Text; track $index) {
                  <p>{{resp}}</p>
                }
              </div>
            </div>
            <p class="date">{{item.date}}</p>
          </div>
        </a>
      </article>
    }
  </section>
</main>
