<div class="cert-grid">
  @for (item of certificationList; track item.id; let i = $index) {
    <a [routerLink]="['/cert', item.id]" class="cert-card" [appReveal]="'up'" [revealDelay]="i * 70">
      <figure class="cert-figure">
        @if (item.image && item.image.length > 0) {
          <img [src]="item.image[0]" [alt]="item.name" loading="lazy" />
        } @else {
          <div class="cert-figure-empty"><i class="bi bi-patch-check"></i></div>
        }
        <span class="cert-figure-hover" aria-hidden="true">
          <i class="bi bi-arrow-up-right"></i>
        </span>
      </figure>
      <div class="cert-body">
        <div class="cert-meta">
          <span>{{ item.issuer }}</span>
          @if (item.issued) { <span>· {{ item.issued }}</span> }
        </div>
        <h3 class="cert-title">{{ item.name }}</h3>
        @if (item.imageName && item.imageName.length > 0) {
          <p class="cert-sub">{{ item.imageName[0] }}</p>
        }
      </div>
    </a>
  }
</div>
