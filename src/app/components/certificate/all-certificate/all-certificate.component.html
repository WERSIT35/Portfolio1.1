<app-back></app-back>
<main class="all-certificates">
  <header class="title page">
    <h1>Certificates</h1>
  </header>
  <section class="cert-grid page">
    @for (item of certificationList; track $index) {
      <article class="cert-card">
        <a [routerLink]="['/cert', item.id]">
          <img [src]="item.image[0]" alt="" />
          <div class="cert-meta">
            <h2>{{ item.name }}</h2>
            <p>{{ item.imageName[0] }}</p>
            <p>{{ item.issuer }} | {{ item.issued }}</p>
            <p>Time spent: {{ item.timeSpent }}</p>
            <p class="desc">{{ item.description }}</p>
            <ul class="tasks">
              @for (task of item.tasksMade; track $index) {
                <li>{{ task }}</li>
              }
            </ul>
          </div>
        </a>
      </article>
    }
  </section>
</main>
