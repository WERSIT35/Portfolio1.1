<section class="impact-strip" [appReveal]="'fade'">
  <div class="page">
    <div class="impact-grid">
      @for (s of stats; track s.label; let i = $index) {
        <div class="impact-cell" [appReveal]="'up'" [revealDelay]="i * 80">
          <span class="impact-icon"><i class="bi" [ngClass]="s.icon"></i></span>
          <div class="impact-text">
            <strong>{{ s.value }}</strong>
            <span>{{ s.label }}</span>
          </div>
        </div>
      }
    </div>
  </div>
</section>
