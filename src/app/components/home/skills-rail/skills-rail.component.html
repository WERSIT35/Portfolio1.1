<div class="sr-grid">
  @for (layer of layers; track layer.label; let i = $index) {
    <div class="sr-card" [appReveal]="'up'" [revealDelay]="i * 80">

      <!-- Card header: icon + category identity + skill count -->
      <header class="sr-card-head">
        <i class="bi sr-card-icon" [ngClass]="layer.headIcon" aria-hidden="true"></i>
        <div class="sr-card-id">
          <span class="sr-card-label">{{ layer.label }}</span>
          <span class="sr-card-sublabel">{{ layer.sublabel }}</span>
        </div>
        <span class="sr-card-count" [attr.aria-label]="layer.skills.length + ' skills'">{{ layer.skills.length }}</span>
      </header>

      <!-- Skill pills: lead skill listed first, always -->
      <div class="sr-card-body">
        @for (skill of layer.skills; track skill.name) {
          <div class="sr-skill" [class.sr-skill--lead]="skill.isLead">
            <i [class]="skill.icon + ' sr-skill-icon'" [style.color]="skill.color" aria-hidden="true"></i>
            <span class="sr-skill-name">{{ skill.name }}</span>
          </div>
        }
      </div>

    </div>
  }
</div>
