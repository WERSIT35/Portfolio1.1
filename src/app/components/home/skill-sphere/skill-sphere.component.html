@if (flat) {
  <ul class="skills-grid" role="list">
    @for (sk of skills; track sk.name) {
      <li class="skill-chip"><i class="{{ sk.icon }}" aria-hidden="true"></i><span>{{ sk.name }}</span></li>
    }
  </ul>
} @else {
  <div class="ss-stage" #stage>
    <div class="ss-sphere">
      @for (sk of skills; track sk.name) {
        <div class="ss-item">
          <span class="skill-chip"><i class="{{ sk.icon }}" aria-hidden="true"></i><span>{{ sk.name }}</span></span>
        </div>
      }
    </div>
  </div>
}
