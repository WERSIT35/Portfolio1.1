<app-back></app-back>
<main class="all-education">
  <header class="title page">
    <h1>EDUCATION</h1>
  </header>
  <section class="edu-grid page">
    @for (item of educationList; track $index) {
      <article class="eduCard">
        <a [routerLink]="['/edu/edulist', item.id]" class="eduLink">
          <div class="eduHeader">
            <div class="eduLogo">
              <img [src]="item.img" alt="" [class.logo-plain]="item.name === 'FreeCodeCamp'" />
            </div>
            <div class="eduHeading">
              <h2>{{ item.name }}</h2>
            </div>
          </div>
          <div class="eduBody">
            <div class="eduMeta">
              <p class="track">{{ item.title }}</p>
              <p class="date">{{ item.date }}</p>
            </div>
            <h3>{{ item.degree }}</h3>
            <div class="description" [innerHTML]="item.description"></div>
            <p class="subjectsLabel">Core Subjects</p>
            <div class="eduSubInfo">
              @for (subject of item.subjects; track $index) {
                <span>{{ subject }}</span>
              }
            </div>
          </div>
          <div class="eduFooter">
            <span>View full details</span>
            <i class="fa-solid fa-arrow-right"></i>
          </div>
        </a>
      </article>
    }
  </section>
</main>
